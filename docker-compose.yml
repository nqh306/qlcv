x-db-env: &db-env
  PGHOST: ${PGHOST:-qlcv-db}
  PGDATABASE: ${PGDATABASE:-qlcv}
  POSTGRES_USER: ${POSTGRES_USER:-qlcv}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qlcv}
  POSTGRES_DB: ${POSTGRES_DB:-qlcv}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  PGDATA: ${PGDATA:-/var/lib/postgresql/data}

x-redis-env: &redis-env
  REDIS_HOST: ${REDIS_HOST:-qlcv-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_URL: ${REDIS_URL:-redis://qlcv-redis:6379/}

x-minio-env: &minio-env
  MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-access-key}
  MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-secret-key}

x-aws-s3-env: &aws-s3-env
  AWS_REGION: ${AWS_REGION:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-access-key}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-secret-key}
  AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://qlcv-minio:9000}
  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}

x-proxy-env: &proxy-env
  APP_DOMAIN: ${APP_DOMAIN:-localhost}
  FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
  CERT_EMAIL: ${CERT_EMAIL:-}
  CERT_ACME_CA: ${CERT_ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
  CERT_ACME_DNS: ${CERT_ACME_DNS:-}
  LISTEN_HTTP_PORT: ${LISTEN_HTTP_PORT:-8080}
  LISTEN_HTTPS_PORT: ${LISTEN_HTTPS_PORT:-8443}
  BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
  SITE_ADDRESS: ${SITE_ADDRESS:-:80}

x-mq-env: &mq-env
  RABBITMQ_HOST: ${RABBITMQ_HOST:-qlcv-mq}
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-qlcv}
  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-qlcv}
  RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-qlcv}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-qlcv}

x-live-env: &live-env
  API_BASE_URL: ${API_BASE_URL:-http://api:8000}
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY:-2FiJk1U2aiVPEQtzLehYGlTSnTnrs7LW}

x-app-env: &app-env
  WEB_URL: ${WEB_URL:-http://localhost:8080}
  DEBUG: ${DEBUG:-0}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
  GUNICORN_WORKERS: 1
  USE_MINIO: ${USE_MINIO:-1}
  DATABASE_URL: ${DATABASE_URL:-postgresql://qlcv:qlcv@qlcv-db/qlcv}
  SECRET_KEY: ${SECRET_KEY:-60gp0byfz2dvffa45cxl20p1scy9xbpf6d8c5y0geejgkyp1b5}
  AMQP_URL: ${AMQP_URL:-amqp://qlcv:qlcv@qlcv-mq:5672/qlcv}
  API_KEY_RATE_LIMIT: ${API_KEY_RATE_LIMIT:-60/minute}
  MINIO_ENDPOINT_SSL: ${MINIO_ENDPOINT_SSL:-0}
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY:-2FiJk1U2aiVPEQtzLehYGlTSnTnrs7LW}

services:
  web:
    image: qlcv-frontend:genco1
    build:
      context: ./frontend
      dockerfile: apps/web/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
      - worker

  space:
    image: qlcv-space:genco1
    build:
      context: ./frontend
      dockerfile: apps/space/Dockerfile.space
    restart: unless-stopped
    depends_on:
      - api
      - worker
      - web

  admin:
    image: qlcv-admin:genco1
    build:
      context: ./frontend
      dockerfile: apps/admin/Dockerfile.admin
    restart: unless-stopped
    depends_on:
      - api
      - web

  live:
    image: qlcv-live:genco1
    build:
      context: ./frontend
      dockerfile: apps/live/Dockerfile.live
    environment:
      <<: [*live-env, *redis-env]
    restart: unless-stopped
    depends_on:
      - api
      - web

  api:
    image: qlcv-backend:genco1
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    command: ./bin/docker-entrypoint-api.sh
    restart: unless-stopped
    volumes:
      - logs_api:/code/qlcv/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - qlcv-db
      - qlcv-redis
      - qlcv-mq

  worker:
    image: qlcv-backend:genco1
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    volumes:
      - logs_worker:/code/qlcv/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - api
      - qlcv-db
      - qlcv-redis
      - qlcv-mq

  beat-worker:
    image: qlcv-backend:genco1
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    volumes:
      - logs_beat-worker:/code/qlcv/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - api
      - qlcv-db
      - qlcv-redis
      - qlcv-mq

  migrator:
    image: qlcv-backend:genco1
    command: ./bin/docker-entrypoint-migrator.sh
    restart: on-failure
    volumes:
      - logs_migrator:/code/qlcv/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - qlcv-db
      - qlcv-redis

  qlcv-db:
    image: postgres:15.7-alpine
    command: postgres -c 'max_connections=1000'
    restart: unless-stopped
    environment:
      <<: *db-env
    volumes:
      - pgdata:/var/lib/postgresql/data

  qlcv-redis:
    image: valkey/valkey:7.2.11-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  qlcv-mq:
    image: rabbitmq:3.13.6-management-alpine
    restart: unless-stopped
    environment:
      <<: *mq-env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  qlcv-minio:
    image: minio/minio:latest
    command: server /export --console-address ":9090"
    restart: unless-stopped
    environment:
      <<: *minio-env
    volumes:
      - uploads:/export

  proxy:
    image: qlcv-proxy:genco1
    build:
      context: ./proxy
      dockerfile: Dockerfile.ce
    restart: unless-stopped
    environment:
      <<: *proxy-env
    ports:
      - "${LISTEN_HTTP_PORT:-8080}:80"
      - "${LISTEN_HTTPS_PORT:-8443}:443"
    volumes:
      - proxy_config:/config
      - proxy_data:/data
    depends_on:
      - web
      - api
      - space
      - admin
      - live

volumes:
  pgdata:
  redisdata:
  uploads:
  logs_api:
  logs_worker:
  logs_beat-worker:
  logs_migrator:
  rabbitmq_data:
  proxy_config:
  proxy_data:
